name: Build iOS Tweak (Dylib)

# Kích hoạt khi có code mới hoặc tự bấm nút chạy
on:
  push:
    branches: [ main, master ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: 1. Lay ma nguon cua Phap Su
        uses: actions/checkout@v4

      - name: 2. Cai dat lo duc Theos va Mua Bua LDID
        run: |
          brew install ldid
          git clone --recursive https://github.com/theos/theos.git ~/theos
          rm -rf ~/theos/sdks
          git clone https://github.com/theos/sdks.git ~/theos/sdks
          echo "THEOS=~/theos" >> $GITHUB_ENV

      - name: 3. Tien hanh ep Dylib va dong goi
        run: |
          make package FINALPACKAGE=1

      - name: 4. Tra hang cho Phap Su
        uses: actions/upload-artifact@v4
        with:
          name: PerformanceHUD_Tweak
          path: packages/*.deb
